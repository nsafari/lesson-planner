<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ضبط و پخش صوت</title>
    <link rel="stylesheet" href="../assets/vendor/tippyjs/tippy.css">
    <script src="../assets/vendor/popperjs/popper.min.js"></script>
    <script src="../assets/vendor/tippyjs/tippy-bundle.umd.min.js"></script>
    <script src="../assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="../assets/vendor/recorderjs/recorder.js"></script>
    <link rel="stylesheet" href="../assets/styles/sound.css">
</head>

<body>
    <div class="audio-recorder-container">
        <h1 class="title">ضبط و پخش صوت</h1>

        <!-- Configuration Section for Testing -->
        <div class="config-section" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #dee2e6;">
            <h3 style="margin: 0 0 10px 0; color: #495057;">تنظیمات برای تست</h3>
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <div>
                    <label for="studentIdInput" style="display: block; margin-bottom: 5px; font-weight: bold;">شناسه دانش‌آموز:</label>
                    <input type="number" id="studentIdInput" value="1" min="1" style="padding: 8px; border: 1px solid #ced4da; border-radius: 4px; width: 100px;">
                </div>
                <div>
                    <label for="assignmentIdInput" style="display: block; margin-bottom: 5px; font-weight: bold;">شناسه تکلیف:</label>
                    <input type="number" id="assignmentIdInput" value="1" min="1" style="padding: 8px; border: 1px solid #ced4da; border-radius: 4px; width: 100px;">
                </div>
                <button id="updateConfigBtn" style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">بروزرسانی تنظیمات</button>
            </div>
            <div style="margin-top: 10px; font-size: 14px; color: #6c757d;">
                <strong>نکته:</strong> این تنظیمات برای تست API استفاده می‌شود. در حالت واقعی، این مقادیر از سیستم احراز هویت دریافت می‌شوند.
            </div>
        </div>

        <div class="sample-counter" id="sampleCounter">
            صوت نمونه را 3 بار گوش دهید: 0/3
        </div>

        <div class="ready-message" id="readyMessage">
            ✅ بریم برای ضبط
        </div>

        <div class="permission-message" id="permissionMessage">
            لطفاً اجازه دسترسی به میکروفون را بدهید
        </div>

        <div class="visualizer-container" id="visualizer">
            <!-- Visualizer bars will be generated by JavaScript -->
        </div>

        <div class="status-text" id="statusText">ابتدا صوت نمونه را 3 بار گوش دهید</div>

        <div class="recording-timer" id="recordingTimer">00:00</div>

        <div class="controls-container">
            <button class="control-btn" id="recordBtn" title="شروع / توقف ضبط صوت" disabled>
                ⚫
            </button>

            <button class="control-btn playback-btn" id="playbackBtn" title="پخش/توقف صوت ضبط شده"
                style="display: none;">
                ▶
            </button>

            <button class="control-btn send-btn" id="sendBtn" title="ارسال صوت" style="display: none;" type="button" data-action="send-audio">
                📤
            </button>

            <button class="control-btn sample-btn" id="sampleBtn" title="پخش نمونه صوت">
                ▶
            </button>
        </div>

        <div class="audio-player-container" id="audioPlayerContainer">
            <audio class="audio-player" id="audioPlayer" controls></audio>
        </div>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" style="display: none; text-align: center; margin-top: 20px;">
            <div style="display: inline-block; padding: 20px; background: #f8f9fa; border-radius: 10px; border: 2px solid #dee2e6;">
                <div style="margin-bottom: 15px;">
                    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                </div>
                <div id="loadingText" style="font-weight: bold; color: #495057;">در حال ارسال صوت...</div>
                <div id="loadingDetails" style="font-size: 14px; color: #6c757d; margin-top: 5px;"></div>
            </div>
        </div>

        <style>
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
    </div>

    <script>
        // Function to update configuration
        function updateConfig() {
            const studentId = document.getElementById('studentIdInput').value;
            const assignmentId = document.getElementById('assignmentIdInput').value;
            
            if (window.setStudentId && window.setAssignmentId) {
                window.setStudentId(studentId);
                window.setAssignmentId(assignmentId);
                
                // Show success message
                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        title: 'موفق!',
                        text: `تنظیمات بروزرسانی شد: دانش‌آموز ${studentId}، تکلیف ${assignmentId}`,
                        icon: 'success',
                        confirmButtonText: 'باشه'
                    });
                } else {
                    alert(`تنظیمات بروزرسانی شد: دانش‌آموز ${studentId}، تکلیف ${assignmentId}`);
                }
            } else {
                alert('خطا: توابع تنظیمات در دسترس نیستند');
            }
        }

        // Add event listener when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            const updateConfigBtn = document.getElementById('updateConfigBtn');
            if (updateConfigBtn) {
                updateConfigBtn.addEventListener('click', function(e) {
                    e.preventDefault(); // Prevent any default form submission
                    updateConfig();
                });
            }
        });
    </script>

    <script type="module" src="../assets/js/sound.js"></script>
</body>

</html>
