<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>داشبورد پیشرفت دروس</title>
  <!-- Bootstrap -->
  <link href="../assets/vendor/bootstrap/bootstrap.rtl.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="../assets/vendor/font-awesome/css/all.css">
  <!-- Limonad.js (timeline) -->
  <script src="../assets/vendor/lemonadejs/lemonade.min.js"></script>
  <!-- Tippy.js -->
  <link rel="stylesheet" href="../assets/vendor/tippyjs/tippy.css">
  <script src="../assets/vendor/popperjs/popper.min.js"></script>
  <script src="../assets/vendor/tippyjs/tippy-bundle.umd.min.js"></script>
  <!-- Highcharts -->
  <script src="../assets/vendor/highcharts/highcharts.js"></script>
  <link rel="stylesheet" href="../assets/styles/index.css">
</head>

<body>
  <!-- Site Header -->
  <header class="site-header">
    <div class="d-flex align-items-center gap-2">
      <img src="../assets/media/nehzat.png" alt="لوگو سایت"
        style="height:48px;width:auto;border-radius:0.5rem;box-shadow:0 2px 8px #0001;">
    </div>

    <div class="dropdown">
      <button class="dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="fa fa-user-circle"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="#"><i class="fa fa-user"></i> <span id="user-name-dropDown"></span> </a></li>
        <li><a class="dropdown-item" href="#"><i class="fa fa-envelope-open-text"></i> <span
              id="user-email-dropDown"></span> </a></li>
        <li><a class="dropdown-item" href="#"><i class="fa fa-cog"></i> نمایش جزئیات</a></li>
        <li>
          <hr class="dropdown-divider">
        </li>
        <li><a class="dropdown-item" href="#"><i class="fa fa-sign-out-alt"></i> خروج</a></li>
      </ul>
    </div>
  </header>
  <div class="dashboard-container bg-white row flex-nowrap">
    <aside class="col-12 col-md-3" id="sidebarMenu">
      <div class="lesson-menu flex-md-column" id="lessonMenu"></div>
    </aside>
    <main class="col-12 col-md-9">
      <h2 class="text-center mb-4">داشبورد پیشرفت دروس</h2>
      <div id="lessonInfo"></div>
      <div class="timeline-container" id="timelineContainer"></div>
      <div class="chart-container">
        <div id="progressChart"></div>
      </div>
      <iframe style="width: 100%;height: 400px;" src="./sound.html" frameborder="0"></iframe>
      <div class="recordings-table-container mt-4">
        <h4 class="mb-3">وضعیت صوت‌های ضبط شده</h4>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>ردیف</th>
                <th>زمان ضبط</th>
                <th>نمره کیفی</th>
                <th>پخش</th>
                <th>بازخورد دبیر</th>
                <th>وضعیت ارسال</th>
              </tr>
            </thead>
            <tbody id="recordingsTableBody">
              <!-- Dynamic content will be loaded here from index.js -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <!-- Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="detailModalLabel">جزئیات مرحله</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="بستن"></button>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- جزئیات مرحله اینجا قرار می‌گیرد -->
        </div>
      </div>
    </div>
  </div>

  <!-- مدال -->
  <div class="modal fade" id="studentModal" tabindex="-1" aria-labelledby="studentModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content shadow-lg">
        <div class="modal-header text-white" style="background-color: #ff004b;">
          <h5 class="modal-title" id="studentModalLabel">اطلاعات دانشجو</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="بستن"></button>
        </div>
        <div class="modal-body">
          <div class="row mb-3">
            <div class="col-md-6"><strong>نام:</strong> <span id="firstName"></span></div>
            <div class="col-md-6"><strong>نام خانوادگی:</strong> <span id="lastName"></span></div>
          </div>
          <div class="row mb-3">
            <div class="col-md-6"><strong>ایمیل:</strong> <span id="email"></span></div>
            <div class="col-md-6"><strong>شماره تماس:</strong> <span id="phoneNumber"></span></div>
          </div>
          <div class="row mb-3">
            <div class="col-md-6"><strong>کد دانشجویی:</strong> <span id="studentId"></span></div>
            <div class="col-md-6"><strong>وضعیت:</strong> <span id="status"></span></div>
          </div>
          <div class="row mb-3">
            <div class="col-md-6"><strong>تاریخ تولد:</strong> <span id="dateOfBirth"></span></div>
            <div class="col-md-6"><strong>آدرس:</strong> <span id="address"></span></div>
          </div>
          <div class="row mb-3">
            <div class="col-md-6"><strong>تاریخ ثبت:</strong> <span id="createdAt"></span></div>
            <div class="col-md-6"><strong>آخرین بروزرسانی:</strong> <span id="updatedAt"></span></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">بستن</button>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  <script type="module" src="../assets/js/index.js"></script>
</body>

</html>
