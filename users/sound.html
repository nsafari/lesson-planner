<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ضبط و پخش صوت</title>
    <link rel="stylesheet" href="../assets/vendor/tippyjs/tippy.css">
    <script src="../assets/vendor/popperjs/popper.min.js"></script>
    <script src="../assets/vendor/tippyjs/tippy-bundle.umd.min.js"></script>
    <script src="../assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="../assets/vendor/recorderjs/recorder.js"></script>
    <link rel="stylesheet" href="../assets/styles/sound.css">
</head>

<body>
    <div class="audio-recorder-container">
        <h1 class="title">ضبط و پخش صوت</h1>

        <div class="sample-counter" id="sampleCounter">
            صوت نمونه را 3 بار گوش دهید: 0/3
        </div>

        <div class="ready-message" id="readyMessage">
            ✅ بریم برای ضبط
        </div>

        <div class="permission-message" id="permissionMessage">
            لطفاً اجازه دسترسی به میکروفون را بدهید
        </div>

        <div class="visualizer-container" id="visualizer">
            <!-- Visualizer bars will be generated by JavaScript -->
        </div>

        <div class="status-text" id="statusText">ابتدا صوت نمونه را 3 بار گوش دهید</div>

        <div class="recording-timer" id="recordingTimer">00:00</div>

        <div class="controls-container">
            <button class="control-btn" id="recordBtn" title="شروع / توقف ضبط صوت" disabled>
                ⚫
            </button>

            <button class="control-btn playback-btn" id="playbackBtn" title="پخش/توقف صوت ضبط شده"
                style="display: none;">
                ▶
            </button>

            <button class="control-btn send-btn" id="sendBtn" title="ارسال صوت" style="display: none;">
                📤
            </button>

            <button class="control-btn sample-btn" id="sampleBtn" title="پخش نمونه صوت">
                ▶
            </button>
        </div>

        <div class="audio-player-container" id="audioPlayerContainer">
            <audio class="audio-player" id="audioPlayer" controls></audio>
        </div>
    </div>

    <script src="../assets/js/sound.js"></script>
</body>

</html>
